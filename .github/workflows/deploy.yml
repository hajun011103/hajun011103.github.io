name: Build & deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout private vault (notes source)
        uses: actions/checkout@v4
        with:
          repository: hajun011103/hajun-vault
          token: ${{ secrets.VAULT_TOKEN }}
          path: _vault

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collect published notes from the vault
        run: bash .github/scripts/collect-content.sh "$GITHUB_WORKSPACE/_vault" notes/content

      - name: Build Quartz (notes)
        working-directory: notes
        run: |
          npm ci
          npx quartz build

      - name: Build Astro (landing)
        working-directory: landing
        run: |
          npm ci
          npm run build

      - name: Merge — Quartz first, then overlay Astro root pages
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r notes/public/. _site/
          cp -r landing/dist/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
